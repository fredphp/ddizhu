<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>手机下载 - 千禧棋牌</title>
  <style>html{overflow:hidden}body{margin:0}img{width:113px}</style>
</head>
<body scroll="no">
  <a href="javascript:void()" target="_blank"><img src="/images/logo.png" /></a>
  <script src="Scripts/jquery.js"></script>
  <script>$(function(){$.ajax({
    contentType:"application/json;charset=utf-8",
    url:"/V/Down",
    type:"POST",
    crossDomain:true,
    dataType:"json",
    data:{act:"url"},
    success:function(o){
      if(o.s) return false;
      if(o.code) $("a").attr("href",o.mobile).find("img").attr("src","data:image/png;base64,"+o.code);
      else $("a").attr("href",o.mobile).find("img").attr("src","/V/Code?"+encodeURIComponent(o.mobile));
    }
  })})</script>
</body>
</html>
