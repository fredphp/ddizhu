<html>
<head>
  <meta http-equiv="content-type" content="text/xml;charset=utf-8" />
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="edge">
  <title>DatePicker</title>
<script type="text/javascript" src="scripts/config.js"></script>
<script>
if(parent==window) location.href="http://www.maotui.net";
var $d,$dp,$pdp=parent.$dp,$dt,$tdt,$sdt,$IE=$pdp.ie,$FF=$pdp.ff,$OPERA=$pdp.opera,$ny,$cMark=false;
if($pdp.eCont){
	$dp={};
	for(var p in $pdp) $dp[p]=$pdp[p];
}
else $dp=$pdp;
	
$dp.getLangIndex=function(name){
	var arr=langList;
	for(var i=0,l=arr.length;i<l;i++)
    if(arr[i].name==name) return i;
	return -1;
}

$dp.getLang=function(name){
	var index=$dp.getLangIndex(name);
	if(index==-1) index=0;
	return langList[index];
}
 
$dp.realLang=$dp.getLang($dp.lang);
document.write("<script src='scripts/lang/"+$dp.realLang.name+".js' charset='"+$dp.realLang.charset+"'><\/script>");

for(var i=0,l=skinList.length;i<l;i++) {
    document.write('<link rel="stylesheet" type="text/css" href="content/'+skinList[i].name+'/datepicker.css" title="'+skinList[i].name+'" charset="'+skinList[i].charset+'" disabled="true"/>');
}
</script>
<script type="text/javascript" src="scripts/calendar.js"></script>
</head>
<body leftmargin="0" topmargin="0" onload="$c.autoSize()" tabindex=0>
</body>
</html>
