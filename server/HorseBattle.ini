//庄家控制
Score = 3000					; 做庄金币数(只有大于此数才可以做庄)
Time = 5					; 做庄次数
TimeAdd = 5					; 坐庄增加次数(当庄家坐满设定的局数之后，所带金币值还超过下面申请庄家列表里面所有玩家金币时，可以再加坐庄TimeAdd局)
BankerScore = 10000000000			; 庄家钱(必须大于Score,否则设置无效)(金币超过BankerScore值之后，就算是下面玩家的金币值大于他的金币值，他也可以再加庄BankerAdd局)			
BankerAdd = 5					; 坐庄增加次数(金币超过BankerScore值之后，就算是下面玩家的金币值大于他的金币值，他也可以再加庄BankerAdd局)
EnableSysBanker = 1				; 系统做庄(0时系统不坐庄；1时有系统坐庄)


